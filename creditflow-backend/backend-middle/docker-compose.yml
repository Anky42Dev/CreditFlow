version: "3.9"
services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
      CHANNEL_LAYERS_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on: [db, redis]
    ports: ["8000:8000"]
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-creditflow_middle}
      POSTGRES_USER: ${DB_USER:-creditflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-creditflow}
    volumes: [pgdata:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
  celery:
    build: .
    command: celery -A config worker -l info
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
      CHANNEL_LAYERS_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on: [db, redis]
  celery-beat:
    build: .
    command: celery -A config beat -l info
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on: [redis]
volumes:
  pgdata:
