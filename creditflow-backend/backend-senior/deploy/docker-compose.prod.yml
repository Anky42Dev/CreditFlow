# DOC 5 §15.1, Roadmap Этап 8 п.20: production-shaped compose. Only nginx
# is published to the host — every other service is reachable solely over
# the internal `backend` network, so nginx's TLS/rate-limit edge (deploy/nginx/nginx.conf)
# is the one path in. Scale stateless services with
# `docker compose -f deploy/docker-compose.prod.yml up --scale web=3 --scale celery-worker-scoring=2`
# (plain `deploy.replicas` below is left as documentation — it only takes
# effect under `docker stack deploy`/swarm, not `docker compose up`).
#
# Run from backend-senior/: docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d

x-django-env: &django-env
  DB_HOST: pgbouncer
  DB_PORT: "5432"
  REPLICA_DB_HOST: db-replica
  REPLICA_DB_PORT: "5432"
  REDIS_URL: redis://redis:6379/1
  CHANNEL_LAYERS_REDIS_URL: redis://redis:6379/2
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  FEATURE_FLAGS_REDIS_URL: redis://redis:6379/3
  EVENT_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
  USE_S3: "True"
  AWS_S3_ENDPOINT_URL: http://minio:9000
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318

services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    env_file: .env.prod
    environment:
      <<: *django-env
    depends_on: [pgbouncer, redis, rabbitmq, minio]
    expose: ["8000"]
    deploy:
      replicas: 3

  celery-worker-scoring:
    build:
      context: ..
      dockerfile: Dockerfile
    command: celery -A config worker -Q scoring -l info --concurrency=4
    env_file: .env.prod
    environment:
      <<: *django-env
    depends_on: [pgbouncer, redis, rabbitmq]
    deploy:
      replicas: 2

  celery-worker-email:
    build:
      context: ..
      dockerfile: Dockerfile
    command: celery -A config worker -Q email -l info --concurrency=2
    env_file: .env.prod
    environment:
      <<: *django-env
    depends_on: [pgbouncer, redis, rabbitmq]

  celery-worker-schedule:
    build:
      context: ..
      dockerfile: Dockerfile
    command: celery -A config worker -Q schedule -l info --concurrency=2
    env_file: .env.prod
    environment:
      <<: *django-env
    depends_on: [pgbouncer, redis, rabbitmq]

  celery-worker-default:
    # Catches tasks with no explicit route (e.g. apps.accounts.tasks.process_avatar) —
    # config/settings.py::CELERY_TASK_ROUTES.
    build:
      context: ..
      dockerfile: Dockerfile
    command: celery -A config worker -Q celery -l info --concurrency=2
    env_file: .env.prod
    environment:
      <<: *django-env
    depends_on: [pgbouncer, redis, rabbitmq]

  celery-beat:
    build:
      context: ..
      dockerfile: Dockerfile
    command: celery -A config beat -l info
    env_file: .env.prod
    environment:
      <<: *django-env
    depends_on: [redis]

  outbox-relay:
    # DOC 5 §8.1, §15.1: relay_outbox_messages runs on Celery Beat's 5s
    # schedule (config/settings.py::CELERY_BEAT_SCHEDULE) but is routed onto
    # its own "outbox" queue (CELERY_TASK_ROUTES) so it scales and fails
    # independently of the app worker pools above. --concurrency=1 avoids
    # concurrent relay ticks racing each other; select_for_update(skip_locked=True)
    # in apps/outbox/tasks.py still allows running >1 replica of this service.
    build:
      context: ..
      dockerfile: Dockerfile
    command: celery -A config worker -Q outbox -l info --concurrency=1
    env_file: .env.prod
    environment:
      <<: *django-env
    depends_on: [pgbouncer, redis, rabbitmq]

  saga-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: python manage.py consume_events
    env_file: .env.prod
    environment:
      <<: *django-env
    depends_on: [pgbouncer, rabbitmq]

  scoring:
    build:
      context: ..
      dockerfile: scoring_service/Dockerfile
    expose: ["9000"]
    deploy:
      replicas: 2

  scoring-consumer:
    build:
      context: ..
      dockerfile: scoring_service/Dockerfile
    command: python -m scoring_service.consumers.application_submitted
    environment:
      EVENT_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on: [rabbitmq]

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-creditflow_senior}
      POSTGRES_USER: ${DB_USER:-creditflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in deploy/.env.prod}
    volumes: [pgdata:/var/lib/postgresql/data]

  db-replica:
    # DOC 5 §15.1/§15.3, AC-10: standalone Postgres standing in for the read
    # replica — no WAL streaming wired up (out of scope: the app only needs
    # something reachable at REPLICA_DB_HOST that can be stopped to exercise
    # `docker compose stop db-replica` -> GET /health/ready -> 503,
    # apps/health/checks.py::check_replica_db()). A real standby would use
    # pg_basebackup + a replication slot against `db`.
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-creditflow_senior}
      POSTGRES_USER: ${DB_USER:-creditflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in deploy/.env.prod}
    volumes: [pgdata_replica:/var/lib/postgresql/data]

  pgbouncer:
    # NOTE: docker-compose.yml (dev) pins edoburu/pgbouncer:1.21.0, but that
    # bare tag no longer exists upstream — only patch-suffixed tags
    # (1.21.0-p0/p1/p2) remain. Verified against the real registry while
    # bringing this stack up; pinning the latest 1.21.0 patch here.
    image: edoburu/pgbouncer:1.21.0-p2
    environment:
      DATABASE_URL: postgres://${DB_USER:-creditflow}:${DB_PASSWORD}@db:5432/${DB_NAME:-creditflow_senior}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "40"
      # postgres:16 defaults password_encryption to scram-sha-256; pgbouncer's
      # own default auth_type (md5) can't relay that and fails every login
      # with "wrong password type" — verified by actually bringing this
      # stack up. Same fix belongs in docker-compose.yml (dev) whenever
      # anyone runs that through pgbouncer instead of straight to `db`.
      AUTH_TYPE: scram-sha-256
    depends_on: [db]

  redis:
    image: redis:7-alpine
    volumes: [redisdata:/data]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    volumes: [rabbitmqdata:/var/lib/rabbitmq]

  minio:
    # DOC 5 §15.1, Roadmap Этап 5 п.13: S3-compatible object storage for
    # avatars/documents (django-storages, USE_S3=True above).
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY in deploy/.env.prod}
    volumes: [miniodata:/data]
    ports: ["9001:9001"]  # console only; S3 API (9000) stays internal

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on: [prometheus]
    ports: ["3000:3000"]

  jaeger:
    # AC-9: real OTLP collector, replacing Этап 7's ConsoleSpanExporter.
    # common/tracing.py::configure_tracing() switches to OTLPSpanExporter
    # when OTEL_EXPORTER_OTLP_ENDPOINT is set (see x-django-env above).
    image: jaegertracing/all-in-one:1.63.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: ["16686:16686"]  # UI only; OTLP ingest (4318) stays internal

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on: [web]
    ports: ["80:80", "443:443"]

volumes:
  pgdata:
  pgdata_replica:
  redisdata:
  rabbitmqdata:
  miniodata:
  grafanadata:
