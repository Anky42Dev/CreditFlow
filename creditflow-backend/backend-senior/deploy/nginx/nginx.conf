# DOC 5 §15.1, Roadmap Этап 8 п.20: TLS-terminating reverse proxy + edge
# rate limit in front of the `web` (daphne/ASGI) replicas. Self-signed cert
# for local docker-compose.prod (see deploy/nginx/gen-cert.sh); swap
# deploy/nginx/certs/* for a real cert (e.g. Let's Encrypt) in a real deploy.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # DOC 5 §17 AC-6 covers login-attempt throttling at the Django layer
    # (DRF throttle classes); this is a coarser edge-level limit against
    # generic abuse/DoS, independent of that.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    upstream web_backend {
        # docker-compose DNS round-robins A records for a scaled service
        # name, so `web:8000` alone is enough after `--scale web=N`.
        server web:8000;
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        client_max_body_size 10m;

        location /ws/ {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=api_limit burst=40 nodelay;

            proxy_pass http://web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
